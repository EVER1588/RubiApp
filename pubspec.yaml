name: aprender_a_leer
description: Una aplicación para aprender a leer usando sílabas, palabras e imágenes.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.9.5
  shared_preferences: ^2.5.3
  flutter_tts: ^4.2.2
  uuid: ^3.0.7
  audioplayers: ^6.0.0     # Reproducción de audios MP3 locales
  http: ^1.2.0             # Llamadas a Google Cloud TTS API
  path_provider: ^2.1.0   # Directorio local del dispositivo
  crypto: ^3.0.3          # Hash MD5 para nombres de archivo

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - lib/utils/images/
    - lib/utils/images/animales/
    - lib/utils/images/frutas/
    - lib/utils/gifs/    # Cambiar videos por gifs

  # Si usas fuentes personalizadas, descomenta y configura esta sección
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700